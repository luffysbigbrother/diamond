  // ── 19. score zero-zero game uses nullish coalescing correctly
  // parseFloat('0') ?? 0 should be 0, not falsy-replaced
  const zeroScore = parseFloat('0') ?? 0;
  assert('zero score preserved (nullish)', zeroScore === 0);
  // Confirm old || 0 bug: parseFloat('0') || 0 is also 0 but for wrong reason
  // The fix ensures explicit null/undefined → 0, not falsy → 0
  const nullScore = parseFloat(null) ?? 0;
  assert('null score → 0 via nullish',  nullScore === 0);

  // ── 20. seriesKey with ESPN-style ids
  assert('seriesKey ESPN ids', seriesKey(22, 3) === '22_3');

  // ── 20b. extractGameDate — shortDetail parsing
  const mockEvent1 = { status: { type: { shortDetail: '5/25 - 1:10 PM EDT' } }, date: '2026-05-25T17:10:00Z' };
  assert('extractGameDate shortDetail May 25',  extractGameDate(mockEvent1, '2026') === '2026-05-25');

  const mockEvent2 = { status: { type: { shortDetail: '12/31 - 7:05 PM EDT' } }, date: '2026-12-31T23:05:00Z' };
  assert('extractGameDate shortDetail Dec 31',  extractGameDate(mockEvent2, '2026') === '2026-12-31');

  const mockEvent3 = { status: { type: { shortDetail: '5/3 - 1:10 PM EDT' } }, date: '2026-05-03T17:10:00Z' };
  assert('extractGameDate single-digit month/day', extractGameDate(mockEvent3, '2026') === '2026-05-03');

  // extractGameDate fallback — no shortDetail, use UTC-4 ET conversion
  const mockEvent4 = { status: { type: { shortDetail: '' } }, date: '2026-05-25T23:30:00Z' };
  // 2026-05-25T23:30Z - 4h = 2026-05-25T19:30 ET → still May 25
  assert('extractGameDate ET fallback same day', extractGameDate(mockEvent4, '2026') === '2026-05-25');

  const mockEvent5 = { status: { type: { shortDetail: '' } }, date: '2026-05-26T02:00:00Z' };
  // 2026-05-26T02:00Z - 4h = 2026-05-25T22:00 ET → May 25 (late night game)
  assert('extractGameDate ET fallback late night', extractGameDate(mockEvent5, '2026') === '2026-05-25');

  // extractGameDate with missing status
  const mockEvent6 = { date: '2026-05-27T17:10:00Z' };
  assert('extractGameDate no status field', typeof extractGameDate(mockEvent6, '2026') === 'string');

  // ── 21. getSlotStates — Day 1 all open
  function mkPreviewGame(idx) {
    return new Game({
      gameId:idx, date:'2026-06-02',
      dateObj:new Date('2026-06-02T12:00:00'),
      time:'2026-06-02T18:00:00Z',
      status:GAME_STATUS.PREVIEW,
      statusDetail:'Preview',
      awayScore:null, homeScore:null,
      awayWin:false, homeWin:false,
      awayPitcher:null, homePitcher:null,
    }, idx);
  }
  const previewGames = [mkPreviewGame(0), mkPreviewGame(1), mkPreviewGame(2), mkPreviewGame(3)];
  const day1States = getSlotStates(previewGames, 1, true, true); // isDay1Open=true (today)
  assert('Day1: Game1 pickable',       day1States.get(previewGames[0]).isPickable === true);
  assert('Day1: Game2 pickable',       day1States.get(previewGames[1]).isPickable === true);
  assert('Day1: Game4 pickable',       day1States.get(previewGames[3]).isPickable === true);
  assert('Day1: nothing missed',       [...day1States.values()].every(s => !s.isMissed));
  assert('Day1: nothing beyondRow',    [...day1States.values()].every(s => !s.isBeyondRow));

  // Past Day 1 (isDay1Open=false) — unplayed GM 4 (idx=3) should be beyondRow=true
  const pastG3 = mkPreviewGame(3);
  const pastDay1 = getSlotStates([pastG3], 1, false, false);
  assert('Past Day1: GM4 isBeyondRow=true',   pastDay1.get(pastG3).isBeyondRow === true);
  assert('Past Day1: GM4 not pickable',        pastDay1.get(pastG3).isPickable  === false);
  assert('Past Day1: GM4 not missed',          pastDay1.get(pastG3).isMissed    === false);

  // ── 22. getSlotStates — Day 2, Game1 final, Games 2-4 open
  const finalG0 = mkGame(0, true);  // Game 1 final
  const prevG1  = mkPreviewGame(1);
  const prevG2  = mkPreviewGame(2);
  const prevG3  = mkPreviewGame(3);
  // Day 2 TODAY (isTodayRow=true) — GMs 2,3,4 all open
  const day2States = getSlotStates([finalG0, prevG1, prevG2, prevG3], 2, true, false, true);
  assert('Day2 today: Game1 prefilled',     day2States.get(finalG0).isPrefilled === true);
  assert('Day2 today: Game1 not pickable',  day2States.get(finalG0).isPickable  === false);
  assert('Day2 today: Game2 pickable',      day2States.get(prevG1).isPickable   === true);
  assert('Day2 today: Game3 pickable',      day2States.get(prevG2).isPickable   === true);
  assert('Day2 today: Game4 pickable',      day2States.get(prevG3).isPickable   === true);
  assert('Day2 today: Game3 not beyondRow', day2States.get(prevG2).isBeyondRow  === false);
  // Day 2 PAST (isTodayRow=false) — GM3,GM4 beyond row
  const day2PastStates = getSlotStates([finalG0, prevG1, prevG2, prevG3], 2, false, false, false);
  assert('Day2 past: Game3 beyondRow',  day2PastStates.get(prevG2).isBeyondRow === true);
  assert('Day2 past: Game4 beyondRow',  day2PastStates.get(prevG3).isBeyondRow === true);

  // ── 23. getSlotStates — Day 3, Games 1-2 final, Game3 current, Game4 beyond
  const finalG1 = mkGame(1, false); // Game 2 final
  const prevG2b = mkPreviewGame(2);
  const prevG3b = mkPreviewGame(3);
  // Day 3 TODAY — GM3 and GM4 both open
  const day3States = getSlotStates([finalG0, finalG1, prevG2b, prevG3b], 3, true, false, true);
  assert('Day3 today: Game2 prefilled',     day3States.get(finalG1).isPrefilled === true);
  assert('Day3 today: Game3 pickable',      day3States.get(prevG2b).isPickable  === true);
  assert('Day3 today: Game4 pickable',      day3States.get(prevG3b).isPickable  === true);
  assert('Day3 today: Game4 not beyondRow', day3States.get(prevG3b).isBeyondRow === false);

  // ── 24. getSlotStates — missed slot (past row, game not final)
  const missedG = mkPreviewGame(0);
  const day2MissedStates = getSlotStates([missedG, mkPreviewGame(1)], 2, false);
  assert('Past row: Game1 missed',     day2MissedStates.get(missedG).isMissed   === true);
  assert('Past row: Game1 not pickable', day2MissedStates.get(missedG).isPickable === false);

  // ── 25. seriesSortKey
  const today25 = new Date('2026-05-28T00:00:00');
  function mkSeriesForSort(dates, allFinal) {
    const games = dates.map((d,i) => new Game({
      gameId:i, date:d, dateObj:new Date(d+'T12:00:00'), time:null,
      status: allFinal ? GAME_STATUS.FINAL : GAME_STATUS.PREVIEW,
      statusDetail:'', awayScore:allFinal?5:null, homeScore:allFinal?2:null,
      awayWin:allFinal, homeWin:false, awayPitcher:null, homePitcher:null,
    }, i));
    return new Series({ key:'sk', away:{id:1,name:'A',abbr:'A',logo:''}, home:{id:2,name:'B',abbr:'B',logo:''}, venue:'', games, totalGames:games.length });
  }
  const completedS = mkSeriesForSort(['2026-05-25','2026-05-26','2026-05-27'], true);
  const activeS    = mkSeriesForSort(['2026-05-28','2026-05-29','2026-05-30'], false);
  const upcomingS  = mkSeriesForSort(['2026-05-29','2026-05-30','2026-05-31'], false);
  assert('seriesSortKey completed = 0', seriesSortKey(completedS, today25) === 0);
  assert('seriesSortKey active = 1',    seriesSortKey(activeS, today25)    === 1);
  assert('seriesSortKey upcoming = 2',  seriesSortKey(upcomingS, today25)  === 2);

  // ── 26. safeScore — NaN guard
  const safeScore = (s) => { const n = parseFloat(s); return isNaN(n) ? 0 : n; };
  assert('safeScore null → 0',      safeScore(null)      === 0);
  assert('safeScore undefined → 0', safeScore(undefined) === 0);
  assert('safeScore 0 → 0',         safeScore('0')       === 0);
  assert('safeScore 5 → 5',         safeScore('5')       === 5);
  assert('safeScore NaN str → 0',   safeScore('abc')     === 0);

  // ── 26b. applyAutoLocks — auto-locks rows when games go final
  // Build a mock series with Game 1 final, Games 2-4 preview
  function mkAutoLockSeries() {
    const g0 = mkGame(0, true);   // final
    const g1 = mkPreviewGame(1);  // preview
    const g2 = mkPreviewGame(2);
    const g3 = mkPreviewGame(3);
    // Give all games the same date so they share a row
    g0.date = '2026-05-25'; g1.date = '2026-05-26';
    g2.date = '2026-05-27'; g3.date = '2026-05-28';
    return new Series({
      key:'al_test',
      away:{id:1,name:'Toronto Blue Jays',abbr:'TOR',logo:''},
      home:{id:2,name:'Baltimore Orioles',abbr:'BAL',logo:''},
      venue:'Camden Yards',
      games:[g0,g1,g2,g3],
      totalGames:4,
    });
  }

  // Before applyAutoLocks — row 1 should not be locked
  const alSeries = mkAutoLockSeries();
  assert('Auto-lock: row 1 not locked before apply',
    !AppState.isRowLocked('al_test', 1));

  // After applyAutoLocks — row 1 should be locked (g0 is final on 2026-05-25)
  applyAutoLocks([alSeries]);
  assert('Auto-lock: row 1 locked after apply (game is final)',
    AppState.isRowLocked('al_test', 1));

  // Row 2 should NOT be locked (g1 is preview on 2026-05-26)
  assert('Auto-lock: row 2 not locked (game not final)',
    !AppState.isRowLocked('al_test', 2));

  // Calling applyAutoLocks again is idempotent
  applyAutoLocks([alSeries]);
  assert('Auto-lock: idempotent — row 1 still locked after second apply',
    AppState.isRowLocked('al_test', 1));

  // Cleanup test state
  delete AppState.locked['al_test_d1'];

  // ── 27. scoreSeriesOutcome — 3-game 2-1 correct team gets bonus
  function mk3GameSeries(awayWins) {
    const games = awayWins.map((aw,i) => mkGame3(i, aw));
    return new Series({
      key:'s3test',
      away:{id:1,name:'Washington Nationals',abbr:'WSH',logo:''},
      home:{id:2,name:'Cleveland Guardians',abbr:'CLE',logo:''},
      venue:'Progressive Field', games, totalGames:3,
    });
  }
  // WSH wins 2-1, Day 1 predicted WSH to win 2-1 correctly
  const s3win = mk3GameSeries([true, true, false]);
  const s3picks_correct = { 0:{1:PICK.AWAY}, 1:{1:PICK.AWAY}, 2:{1:PICK.HOME} };
  const {pts:s3correctPts} = scoreSeriesOutcome(s3win, s3picks_correct);
  assert('3-game 2-1 correct team = +20pts', s3correctPts === OUTCOME_BONUS.WIN_2_1_CORRECT_TEAM);

  // WSH wins 2-1 but user predicted CLE to win 2-1 — wrong team
  const s3picks_wrong = { 0:{1:PICK.HOME}, 1:{1:PICK.HOME}, 2:{1:PICK.AWAY} };
  const {pts:s3wrongPts} = scoreSeriesOutcome(s3win, s3picks_wrong);
  assert('3-game 2-1 wrong team = +8pts', s3wrongPts === OUTCOME_BONUS.WIN_2_1_WRONG_TEAM);

  // 3-game sweep — should still give SWEEP_CORRECT bonus
  const s3sweep = mk3GameSeries([true, true, true]);
  const s3sweepPicks = { 0:{1:PICK.AWAY}, 1:{1:PICK.AWAY}, 2:{1:PICK.AWAY} };
  const {pts:s3sweepPts} = scoreSeriesOutcome(s3sweep, s3sweepPicks);
  assert('3-game sweep correct = +40pts', s3sweepPts === OUTCOME_BONUS.SWEEP_CORRECT);

  // ── 28. Series.outcome() — 2-1 is a win not a split
  const win21Series = mkSeries4([true,true,false,false]); // away wins 2, home wins 2? No—
  // Build a 3-game series: away wins games 1,2; home wins game 3
  function mkGame3(idx, awayWin){
    // Use fixed dates starting May 25 — avoids fragile string concat bugs
    const dates = ['2026-05-25','2026-05-26','2026-05-27','2026-05-28','2026-05-29'];
    const d = dates[idx] || '2026-05-29';
    return new Game({
      gameId:idx, date:d,
      dateObj:new Date(d+'T12:00:00'),
      time:null, status:GAME_STATUS.FINAL, statusDetail:'Final',
      awayScore:awayWin?5:2, homeScore:awayWin?2:5,
      awayWin, homeWin:!awayWin, awayPitcher:null, homePitcher:null,
    }, idx);
  }
  const s3 = new Series({
    key:'s3', away:{id:1,name:'Washington Nationals',abbr:'WSH',logo:''},
    home:{id:2,name:'Cleveland Guardians',abbr:'CLE',logo:''},
    venue:'Progressive Field', games:[mkGame3(0,true),mkGame3(1,true),mkGame3(2,false)], totalGames:3,
  });
  const o21 = s3.outcome();
  assert('2-1 series is win not split', o21.type === 'win');
  assert('2-1 winner label is WSH',     o21.label.includes('WSH'));
  assert('2-1 label includes Win Series 2-1', o21.label.includes('2-1'));

  // A 2-2 split in a 4-game series IS a split
  const split22 = mkSeries4([true,false,true,false]);
  const o22 = split22.outcome();
  assert('2-2 in 4-game IS a split', o22.type === 'split');

  // A 1-1 in a 2-game series IS a split
  const s2 = new Series({
    key:'s2', away:{id:1,name:'A',abbr:'A',logo:''}, home:{id:2,name:'B',abbr:'B',logo:''},
    venue:'', games:[mkGame3(0,true),mkGame3(1,false)], totalGames:2,
  });
  assert('1-1 in 2-game IS a split', s2.outcome().type === 'split');

  // ── Results
  const total = pass.length + fail.length;
  if(fail.length === 0){
    console.log('%c✓ Diamond Audit: ' + pass.length + '/' + total + ' tests passed', 'color:#22c55e;font-weight:bold;font-size:13px');
  } else {
    console.warn('%c✗ Diamond Audit: ' + fail.length + ' FAILED of ' + total, 'color:#ef4444;font-weight:bold;font-size:13px');
    fail.forEach(f => console.error(' FAIL:', f));
  }
  pass.forEach(p => console.log(' ✓', p));
})();
</script>
